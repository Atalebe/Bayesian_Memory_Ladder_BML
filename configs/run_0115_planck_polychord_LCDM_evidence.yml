output: results/public/run_0115_planck_polychord_LCDM_evidence

theory:
  camb:
    stop_at_error: false
    extra_args:
      lmax: 2500
      lens_potential_accuracy: 1

likelihood:
  planck_2018_highl_plik.TTTEEE: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_lensing.clik: null

params:
  logA:
    prior: {min: 2.6, max: 3.5}
    ref: {dist: norm, loc: 3.044, scale: 0.014}
    proposal: 0.008
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_s

  ns:
    prior: {min: 0.90, max: 1.05}
    ref: {dist: norm, loc: 0.965, scale: 0.004}
    proposal: 0.0015
    latex: n_s

  H0:
    prior: {min: 55.0, max: 80.0}
    ref: {dist: norm, loc: 67.36, scale: 0.5}
    proposal: 0.35
    latex: H_0

  ombh2:
    prior: {min: 0.019, max: 0.025}
    ref: {dist: norm, loc: 0.02237, scale: 0.00015}
    proposal: 0.00010
    latex: \Omega_b h^2

  omch2:
    prior: {min: 0.09, max: 0.16}
    ref: {dist: norm, loc: 0.12, scale: 0.001}
    proposal: 0.0008
    latex: \Omega_c h^2

  tau:
    prior: {min: 0.01, max: 0.12}
    ref: {dist: norm, loc: 0.0544, scale: 0.007}
    proposal: 0.005
    latex: \tau_\mathrm{reio}

  mnu: 0.06
  omk: 0.0

sampler:
  polychord:
    nlive: 192
    num_repeats: 18
    precision_criterion: 0.2
    boost_posterior: 0.0
    feedback: 1
    max_ndead: -1
