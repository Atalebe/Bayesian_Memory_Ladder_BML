output: results/public/run_0116_planck_polychord_memory_restricted_v2_evidence

theory:
  camb:
    stop_at_error: false
    external_primordial_pk: true
    extra_args:
      lmax: 2500
      lens_potential_accuracy: 1

  bml.cobaya_bml_theory.bml_theory:
    kmin: 1.0e-6
    kmax: 1.0
    nk: 90
    spacing: log
    pivot_k: 0.05

    x_start: 80.0
    x_end: 1.0e-3
    method: DOP853
    rtol: 3.0e-5
    atol: 3.0e-7

    window_enabled: true
    x_window_enabled: true
    x0: 1.0
    sigma_ln_x: 0.6

    alpha_zero_tol: 1.0e-14
    alpha_soft_cap: 1.2
    min_shape_ratio: 1.0e-12
    max_shape_ratio: 1.0e12
    max_shape_dynamic_range: 1.0e8
    max_log_slope_abs: 25.0

    theory_diag_log_path: results/public/diag_logs/run_0116_bml_theory_diag.jsonl

    check_R_conservation: true
    R_drift_threshold: 1.0e-3
    R_monitor_nk_smallest: 4
    R_tail_x_values: [1.0e-2, 5.0e-3, 1.0e-3]

likelihood:
  planck_2018_highl_plik.TTTEEE: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_lensing.clik: null

params:
  logA:
    prior: {min: 3.025, max: 3.080}
    ref: {dist: norm, loc: 3.054, scale: 0.006}
    proposal: 0.003
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_s

  ns:
    prior: {min: 0.958, max: 0.970}
    ref: {dist: norm, loc: 0.9643, scale: 0.0025}
    proposal: 0.0012
    latex: n_s

  H0:
    prior: {min: 66.95, max: 67.85}
    ref: {dist: norm, loc: 67.45, scale: 0.20}
    proposal: 0.08
    latex: H_0

  ombh2:
    prior: {min: 0.02224, max: 0.02256}
    ref: {dist: norm, loc: 0.02240, scale: 0.00006}
    proposal: 0.00004
    latex: \Omega_b h^2

  omch2:
    prior: {min: 0.1189, max: 0.1205}
    ref: {dist: norm, loc: 0.11977, scale: 0.00030}
    proposal: 0.00018
    latex: \Omega_c h^2

  tau:
    prior: {min: 0.053, max: 0.066}
    ref: {dist: norm, loc: 0.0593, scale: 0.0025}
    proposal: 0.0012
    latex: \tau_\mathrm{reio}

  mnu: 0.06
  omk: 0.0

  alpha:
    prior: {min: 0.10, max: 0.32}
    ref: {dist: norm, loc: 0.216, scale: 0.035}
    proposal: 0.012
    latex: \alpha

  k_star:
    prior: {min: 0.00128, max: 0.00162}
    ref: {dist: norm, loc: 0.00143, scale: 0.00006}
    proposal: 0.00003
    latex: k_*

  sigma_ln:
    prior: {min: 0.43, max: 0.50}
    ref: {dist: norm, loc: 0.468, scale: 0.012}
    proposal: 0.005
    latex: \sigma_{\ln}

sampler:
  polychord:
    nlive: 160
    num_repeats: 12
    precision_criterion: 0.3
    boost_posterior: 0.0
    feedback: 1
    max_ndead: -1
