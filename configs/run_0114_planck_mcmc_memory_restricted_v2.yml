output: results/public/run_0114_planck_mcmc_memory_restricted_v2

theory:
  camb:
    stop_at_error: false
    external_primordial_pk: true
    extra_args:
      lmax: 2500
      lens_potential_accuracy: 1

  bml.cobaya_bml_theory.bml_theory:
    kmin: 1.0e-6
    kmax: 1.0
    nk: 120
    spacing: log
    pivot_k: 0.05

    x_start: 80.0
    x_end: 1.0e-3
    method: DOP853
    rtol: 1.0e-5
    atol: 1.0e-7

    window_enabled: true
    x_window_enabled: true
    x0: 1.0
    sigma_ln_x: 0.6

    alpha_zero_tol: 1.0e-14
    alpha_soft_cap: 1.2
    min_shape_ratio: 1.0e-12
    max_shape_ratio: 1.0e12
    max_shape_dynamic_range: 1.0e8
    max_log_slope_abs: 25.0

    theory_diag_log_path: results/public/diag_logs/run_0114_bml_theory_diag.jsonl

    check_R_conservation: true
    R_drift_threshold: 1.0e-3
    R_monitor_nk_smallest: 5
    R_tail_x_values: [1.0e-2, 5.0e-3, 2.0e-3, 1.0e-3]

likelihood:
  planck_2018_highl_plik.TTTEEE: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_lensing.clik: null

params:
  logA:
    prior: {min: 2.9, max: 3.2}
    ref: {dist: norm, loc: 3.055, scale: 0.006}
    proposal: 0.003
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_s

  ns:
    prior: {min: 0.955, max: 0.972}
    ref: {dist: norm, loc: 0.9648, scale: 0.0025}
    proposal: 0.0012
    latex: n_s

  H0:
    prior: {min: 66.8, max: 68.0}
    ref: {dist: norm, loc: 67.35, scale: 0.20}
    proposal: 0.08
    latex: H_0

  ombh2:
    prior: {min: 0.0222, max: 0.0226}
    ref: {dist: norm, loc: 0.02243, scale: 0.00006}
    proposal: 0.00004
    latex: \Omega_b h^2

  omch2:
    prior: {min: 0.1188, max: 0.1206}
    ref: {dist: norm, loc: 0.11975, scale: 0.00035}
    proposal: 0.00020
    latex: \Omega_c h^2

  tau:
    prior: {min: 0.054, max: 0.068}
    ref: {dist: norm, loc: 0.061, scale: 0.0025}
    proposal: 0.0012
    latex: \tau_\mathrm{reio}

  mnu: 0.06
  omk: 0.0

  alpha:
    prior: {min: 0.10, max: 0.40}
    ref: {dist: norm, loc: 0.27, scale: 0.04}
    proposal: 0.015
    latex: \alpha

  k_star:
    prior: {min: 0.00120, max: 0.00170}
    ref: {dist: norm, loc: 0.00142, scale: 0.00008}
    proposal: 0.000035
    latex: k_*

  sigma_ln:
    prior: {min: 0.42, max: 0.52}
    ref: {dist: norm, loc: 0.48, scale: 0.015}
    proposal: 0.006
    latex: \sigma_{\ln}

sampler:
  mcmc:
    burn_in: 0
    max_tries: 100000
    learn_every: 40d
    output_every: 60
    callback_every: 60
    drag: true
    oversample_power: 0.4
    proposal_scale: 0.6
    Rminus1_stop: 0.08
    Rminus1_cl_stop: 0.12
